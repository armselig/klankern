services:
    db:
        build: ./docker/postgres
        container_name: klankern_db_container
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/postgresql/data

volumes:
    db_data:
