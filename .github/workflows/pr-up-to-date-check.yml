name: PR Up-to-Date Check

on:
    pull_request:
        types: [opened, synchronize, reopened]
    push:
        branches:
            - develop
            - main

jobs:
    check-pr-status:
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Check all open PRs
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: prs } = await github.rest.pulls.list({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: 'open',
                        base: context.ref.replace('refs/heads/', '')
                      });

                      for (const pr of prs) {
                        const { data: comparison } = await github.rest.repos.compareCommits({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          base: pr.head.sha,
                          head: context.sha
                        });

                        if (comparison.behind_by > 0) {
                          await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: pr.number,
                            body: `⚠️ **This PR is out of date with \`${pr.base.ref}\`**\n\n` +
                                  `This branch is ${comparison.behind_by} commit(s) behind the base branch.\n\n` +
                                  `**Action required:** Please update this branch before merging:\n` +
                                  `\`\`\`bash\n` +
                                  `git fetch origin\n` +
                                  `git rebase origin/${pr.base.ref}\n` +
                                  `git push --force-with-lease\n` +
                                  `\`\`\`\n\n` +
                                  `Or merge the base branch:\n` +
                                  `\`\`\`bash\n` +
                                  `git fetch origin\n` +
                                  `git merge origin/${pr.base.ref}\n` +
                                  `git push\n` +
                                  `\`\`\``
                          });
                        }
                      }
