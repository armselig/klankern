name: Tests

on:
    pull_request:
        branches: [develop, main]
    push:
        branches: [develop, main]

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: klankern_user
                    POSTGRES_PASSWORD: klankern_password
                    POSTGRES_DB: klankern_db
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.13.1

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.17.0"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run database migrations
              run: pnpm run db:migrate
              env:
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_USER: klankern_user
                  DB_PASSWORD: klankern_password
                  DB_NAME: klankern_db

            - name: Run tests
              run: pnpm test
              env:
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_USER: klankern_user
                  DB_PASSWORD: klankern_password
                  DB_NAME: klankern_db

            - name: Run type check
              run: pnpm run typecheck
