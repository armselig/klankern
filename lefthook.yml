# This file is generated by the AI agent.
# It is based on the project guidelines and best practices.

pre-commit:
    parallel: true
    commands:
        biome:
            glob: "*.{js,ts,jsx,tsx,json}"
            run: pnpm exec biome check --write {staged_files}
            stage_fixed: true
        prettier-vue:
            glob: "*.{vue,md,yaml,yml,css,html,scss}"
            run: pnpm exec prettier --write {staged_files}
            stage_fixed: true
            exclude:
                - pnpm-lock.yaml

pre-push:
    commands:
        test:
            run: pnpm run test
